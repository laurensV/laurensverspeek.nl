<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>offline — laurensverspeek.nl</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #101014;
      color: #e8e8ea;
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .box { padding: 2rem; max-width: 34rem; }
    .glyph { color: #ffba00; }
    h1 { font-size: 1.2rem; margin: 0 0 1rem; color: #ffba00; }
    p { margin: 0.4rem 0; font-size: 0.85rem; line-height: 1.6; }
    .muted { color: #8a8a92; font-size: 0.75rem; }
    .cursor {
      display: inline-block;
      width: 0.55em; height: 1.05em;
      background: #ffba00;
      vertical-align: text-bottom;
      animation: blink 1.15s steps(2, start) infinite;
    }
    @keyframes blink { to { visibility: hidden } }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none } }
  </style>
</head>
<body>
  <div class="box">
    <h1><span class="glyph">&gt;_</span> no uplink</h1>
    <p>$ ping laurensverspeek.nl</p>
    <p class="muted">ping: network is unreachable — you appear to be offline.</p>
    <p class="muted">pages you visited before are still cached; this one wasn't. the site will
      reconnect by itself the moment your network returns.</p>
    <p>$ <span class="cursor"></span></p>
  </div>
  <script>
    addEventListener('online', function () { location.reload() })
  </script>
</body>
</html>
