name: Deploy on gh-pages

on:
  push:
    branches:
      - main
  # PRs get the full check suite, but never the deploy step
  pull_request:
  # deploys are manual now: pushes to main run the checks but do NOT deploy —
  # trigger "Run workflow" (workflow_dispatch) to actually cut a release and ship
  workflow_dispatch:

# serialize deploys on a branch so two overlapping runs can't compute the same
# release version and collide on the tag/GitHub Release (queue, don't cancel a
# mid-deploy)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # needed to push the release tag + create the GitHub Release on each deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # full history + tags: the terminal's `git log` is baked from the real
          # repo, and the release step reads the latest tag to bump the version
          fetch-depth: 0

      # a manual deploy cuts the next patch release; SITE_VERSION is baked into
      # the build (status bar, terminal banner, BIOS splash) and the tag/Release
      # is created after a successful deploy
      - name: Compute next release version
        if: github.event_name == 'workflow_dispatch'
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v2.0.1"
          else
            version=${latest#v}
            major=${version%%.*}; rest=${version#*.}
            minor=${rest%%.*}; patch=${rest#*.}
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "SITE_VERSION=$next" >> "$GITHUB_ENV"
          echo "Next release: $next"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run lint:styles
      - run: npm run typecheck
      - run: npm run typecheck:tests
      - run: npm run typecheck:scripts
      - run: npm run test
      - run: npm run test:nuxt
      # boots the real relay and drills world / scores / pong / chess / chat / race
      - run: npm run test:relay

      # browser is needed by the resume PDF step (postgenerate) and the E2E run
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # set the GOATCOUNTER_CODE repository variable to enable analytics + `stats`
      - run: npm run generate
        env:
          NUXT_PUBLIC_GOATCOUNTER: ${{ vars.GOATCOUNTER_CODE }}
      - name: End-to-end tests
        run: npm run test:e2e

      - name: Deploy
        if: github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.output/public

      # tag this commit and publish a GitHub Release for the version that just
      # shipped (creates the tag at the deployed commit)
      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$SITE_VERSION" \
            --title "$SITE_VERSION" \
            --target "$GITHUB_SHA" \
            --notes "Automated release — deployed to https://laurensverspeek.nl (build ${GITHUB_SHA:0:7})."
