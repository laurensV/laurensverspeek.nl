name: Deploy on gh-pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # full history: the terminal's `git log` is baked from the real repo
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:tests
      - run: npm run test

      # browser is needed by the resume PDF step (postgenerate) and the E2E run
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # set the GOATCOUNTER_CODE repository variable to enable analytics + `stats`
      - run: npm run generate
        env:
          NUXT_PUBLIC_GOATCOUNTER: ${{ vars.GOATCOUNTER_CODE }}
      - name: End-to-end tests
        run: npm run test:e2e

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.output/public
