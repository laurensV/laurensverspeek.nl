name: Deploy on gh-pages

on:
  push:
    branches:
      - main
  # PRs get the full check suite, but never the deploy job
  pull_request:

jobs:
  # Every push and PR runs the whole check suite and builds the site. On a push
  # to main the build is uploaded as an artifact for the deploy job to ship.
  build:
    runs-on: ubuntu-latest
    outputs:
      site_version: ${{ steps.version.outputs.site_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # full history + tags: the terminal's `git log` is baked from the real
          # repo, and the version step reads the latest tag to bump the release
          fetch-depth: 0

      # a deploy cuts the next patch release; SITE_VERSION is baked into the build
      # (status bar, terminal banner, BIOS splash) and handed to the deploy job so
      # it can tag + create the Release. Only computed for main pushes — PR builds
      # fall back to the latest tag (see nuxt.config.ts).
      - name: Compute next release version
        id: version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v2.0.1"
          else
            version=${latest#v}
            major=${version%%.*}; rest=${version#*.}
            minor=${rest%%.*}; patch=${rest#*.}
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "SITE_VERSION=$next" >> "$GITHUB_ENV"
          echo "site_version=$next" >> "$GITHUB_OUTPUT"
          echo "Next release: $next"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run lint:styles
      - run: npm run typecheck
      - run: npm run typecheck:tests
      - run: npm run typecheck:scripts
      - run: npm run test
      - run: npm run test:nuxt
      # boots the real relay and drills world / scores / pong / chess / chat / race
      - run: npm run test:relay

      # browser is needed by the resume PDF step (postgenerate) and the E2E run
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # set the GOATCOUNTER_CODE repository variable to enable analytics + `stats`
      - run: npm run generate
        env:
          NUXT_PUBLIC_GOATCOUNTER: ${{ vars.GOATCOUNTER_CODE }}
      - name: End-to-end tests
        run: npm run test:e2e

      # hand the built site to the deploy job (only needed for a real deploy)
      - name: Upload site artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: ./.output/public
          retention-days: 1
          include-hidden-files: true

  # The deploy is gated by the `production` environment: configure Required
  # reviewers on it (Settings → Environments → production) and this job pauses as
  # "Waiting" after a green build. Approve it from the same workflow run and it
  # ships — no second pipeline. Never runs on PRs.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://laurensverspeek.nl
    # push the release tag + create the GitHub Release, and let peaceiris push to
    # the gh-pages branch
    permissions:
      contents: write
    # serialize deploys so two approved runs can't collide on the tag/Release
    # (queue, don't cancel a mid-deploy)
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: false
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./.output/public

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.output/public

      # tag the deployed commit and publish a GitHub Release for the version that
      # was baked into this build (creates the tag at that commit)
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_VERSION: ${{ needs.build.outputs.site_version }}
        run: |
          gh release create "$SITE_VERSION" \
            --title "$SITE_VERSION" \
            --target "$GITHUB_SHA" \
            --notes "Automated release — deployed to https://laurensverspeek.nl (build ${GITHUB_SHA:0:7})."
